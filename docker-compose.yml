# DevOps Copilot — single-service compose (frontend + backend in one image).
#
# The image builds the SPA and serves it from FastAPI, so http://localhost:8000
# gives you the full app. MCP servers run as stdio subprocesses inside the
# container (launched by the agent), so no extra services are required.
#
# For a real multi-instance deployment, swap the SQLite checkpointer for Postgres
# and front this with a shared rate limiter — see DEPLOY.md.

services:
  copilot:
    build: .
    ports:
      - "8000:8000"
    environment:
      # --- environment / security ---
      # Set to "production" to fail closed unless COPILOT_API_TOKEN is set.
      COPILOT_ENV: ${COPILOT_ENV:-development}
      COPILOT_API_TOKEN: ${COPILOT_API_TOKEN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      COPILOT_RATE_LIMIT_PER_MIN: ${COPILOT_RATE_LIMIT_PER_MIN:-120}
      COPILOT_MAX_SESSIONS: ${COPILOT_MAX_SESSIONS:-50}
      # --- LLM provider + keys ---
      COPILOT_PROVIDER: ${COPILOT_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # --- data sources ---
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      TARGET_REPO_PATH: ./sample_repo
      LOGS_DATA_PATH: ./app/mcp/servers/logs_metrics/sample_data
      # --- agent + state ---
      COPILOT_MAX_ITERATIONS: ${COPILOT_MAX_ITERATIONS:-8}
      COPILOT_CHECKPOINT_DB: /data/copilot_checkpoints.sqlite
    volumes:
      - copilot_state:/data
    restart: unless-stopped

volumes:
  copilot_state:
