name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check app tests evals
      - name: Mypy
        run: uv run mypy app
      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint        # ESLint (typescript-eslint + react-hooks)
      - run: npm run typecheck   # full tsc (--force) — fails CI on any type error
      - run: npm run test        # Vitest unit tests
      - run: npm run build
