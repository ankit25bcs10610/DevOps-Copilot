name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check app tests evals
      - name: Mypy
        run: uv run mypy app
      - name: Pytest
        run: uv run pytest -q
      - name: Prompt-injection red-team gate
        # Scores the guardrails against an adversarial corpus (offline, no API key).
        # Fails CI if injection detection regresses or benign telemetry is flagged.
        run: uv run python -m evals.run_redteam
      - name: Golden-trajectory replay gate
        # Replays recorded incident cassettes offline (no API key). No-op until a
        # cassette is recorded (evals/cassettes/golden.json); fails on a regression.
        run: |
          if [ -f evals/cassettes/golden.json ]; then
            uv run python -m evals.run_golden
          else
            echo "no golden cassette yet — skipping (record with: uv run python -m evals.run_golden --record)"
          fi

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint        # ESLint (typescript-eslint + react-hooks)
      - run: npm run typecheck   # full tsc (--force) — fails CI on any type error
      - run: npm run test        # Vitest unit tests
      - run: npm run build
